name: java build

on:
  push:
    branches:
      - master
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'zulu'
          cache: maven
      - name: Build Application
        run: >
          mvn clean install
          -DDB_PASSWORD=${{secrets.DB_PASSWORD}}
          -DDB_USERNAME=${{secrets.DB_USERNAME}}
          -DDB_URL=${{secrets.DB_URL}}
      - name: Build image
        run: docker build -t bigman004/voting-backend:latest .
      - name: Tag image
        run: docker tag voting-backend bigmnan004/voting-backend:latest
      - name: login
        run:  docker login -u bigman004 -p ${{secrets.DOCKER_SECRET}}
      - name: push image
        run:  docker push bigman004/voting-backend:latest


